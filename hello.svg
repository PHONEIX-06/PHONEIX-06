<svg width="860" height="280" viewBox="0 0 860 280" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="bg" cx="50%" cy="40%" r="70%">
    <stop offset="0%" stop-color="#160429"/>
    <stop offset="100%" stop-color="#060610"/>
  </radialGradient>
  <linearGradient id="ul" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#7C3AED"/>
    <stop offset="50%" stop-color="#00FFFF"/>
    <stop offset="100%" stop-color="#FF6B6B"/>
  </linearGradient>
  <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#8B5CF6"/>
    <stop offset="100%" stop-color="#6D28D9"/>
  </linearGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softglow">
    <feGaussianBlur stdDeviation="6" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <style>
    @keyframes bob{0%,100%{transform:translateY(0px)}50%{transform:translateY(-8px)}}
    @keyframes wave{0%,100%{transform:rotate(-20deg)}50%{transform:rotate(28deg)}}
    @keyframes blink{0%,88%,100%{transform:scaleY(1)}93%{transform:scaleY(0.08)}}
    @keyframes bubblebounce{0%,100%{transform:translateY(0px)}50%{transform:translateY(-5px)}}
    @keyframes fl1{0%,18%,100%{opacity:1}32%,88%{opacity:0}}
    @keyframes fl2{0%,30%{opacity:0}42%,58%{opacity:1}70%,100%{opacity:0}}
    @keyframes fl3{0%,58%{opacity:0}70%,85%{opacity:1}96%,100%{opacity:0}}
    @keyframes sweep{0%{stroke-dashoffset:400}60%{stroke-dashoffset:0}100%{stroke-dashoffset:-400}}
    @keyframes tw1{0%,100%{opacity:0.9}50%{opacity:0.1}}
    @keyframes tw2{0%,100%{opacity:0.2}50%{opacity:1}}
    @keyframes pingdot{0%,100%{opacity:1}50%{opacity:0.3}}
    @keyframes pingring{0%{r:6;opacity:0.8}100%{r:18;opacity:0}}
    @keyframes glitch1{0%,87%,100%{opacity:0;transform:translate(0,0)}88%{opacity:0.7;transform:translate(-3px,0);clip-path:inset(20% 0 50% 0)}90%{opacity:0.4;transform:translate(3px,0);clip-path:inset(60% 0 5% 0)}92%{opacity:0}}
    @keyframes glitch2{0%,92%,100%{opacity:0;transform:translate(0,0)}93%{opacity:0.6;transform:translate(3px,0);clip-path:inset(5% 0 70% 0)}95%{opacity:0.3;transform:translate(-2px,0);clip-path:inset(45% 0 20% 0)}97%{opacity:0}}
    @keyframes floatcode{0%,100%{transform:translateY(0);opacity:0.45}50%{transform:translateY(-7px);opacity:0.85}}
    .char{animation:bob 2.2s ease-in-out infinite}
    .arm-wave{animation:wave 0.7s ease-in-out infinite;transform-origin:179px 172px}
    .eye-l{animation:blink 4.5s ease-in-out infinite;transform-origin:120px 130px}
    .eye-r{animation:blink 4.5s ease-in-out infinite 0.08s;transform-origin:150px 130px}
    .bubble{animation:bubblebounce 2.8s ease-in-out infinite}
    .r1{animation:fl1 10s ease-in-out infinite}
    .r2{animation:fl2 10s ease-in-out infinite}
    .r3{animation:fl3 10s ease-in-out infinite}
    .ul{animation:sweep 2.4s ease-in-out infinite;stroke-dasharray:400}
    .s1{animation:tw1 2.2s ease-in-out infinite}
    .s2{animation:tw2 1.8s ease-in-out infinite}
    .s3{animation:tw1 3.1s ease-in-out infinite 0.6s}
    .s4{animation:tw2 2.5s ease-in-out infinite 1s}
    .pdot{animation:pingdot 1.4s ease-in-out infinite}
    .pring{animation:pingring 1.4s ease-out infinite}
    .g1{animation:glitch1 6s steps(1) infinite}
    .g2{animation:glitch2 6s steps(1) infinite 0.5s}
    .fc1{animation:floatcode 3s ease-in-out infinite}
    .fc2{animation:floatcode 3.6s ease-in-out infinite 0.7s}
    .fc3{animation:floatcode 2.9s ease-in-out infinite 1.3s}
  </style>
</defs>

<!-- Background -->
<rect width="860" height="280" fill="url(#bg)"/>

<!-- Scanline sweep -->
<rect width="860" height="2" fill="#00FFFF" opacity="0.035">
  <animateTransform attributeName="transform" type="translate" values="0,-10;0,290" dur="5s" repeatCount="indefinite"/>
</rect>

<!-- Stars -->
<circle class="s1" cx="28"  cy="18"  r="1.5" fill="#00FFFF"/>
<circle class="s2" cx="110" cy="8"   r="1.2" fill="#A78BFA"/>
<circle class="s3" cx="290" cy="26"  r="1.5" fill="#ffffff"/>
<circle class="s4" cx="490" cy="14"  r="1.2" fill="#00FFFF"/>
<circle class="s1" cx="670" cy="22"  r="1.5" fill="#A78BFA"/>
<circle class="s2" cx="830" cy="10"  r="1.2" fill="#ffffff"/>
<circle class="s3" cx="55"  cy="245" r="1.2" fill="#A78BFA"/>
<circle class="s4" cx="800" cy="252" r="1.5" fill="#00FFFF"/>
<circle class="s1" cx="430" cy="265" r="1.2" fill="#ffffff"/>
<circle class="s2" cx="620" cy="258" r="1.5" fill="#A78BFA"/>

<!-- Floating code bg left -->
<text class="fc1" x="10" y="72"  font-family="monospace" font-size="10" fill="#7C3AED">&lt;dev/&gt;</text>
<text class="fc2" x="8"  y="195" font-family="monospace" font-size="10" fill="#00FFFF">{ ml }</text>
<text class="fc3" x="6"  y="258" font-family="monospace" font-size="10" fill="#A78BFA">print()</text>


<!-- ══════════════════════════ -->
<!--  CHARACTER  left section  -->
<!-- ══════════════════════════ -->
<g class="char">

  <!-- shadow -->
  <ellipse cx="135" cy="275" rx="50" ry="7" fill="#000" opacity="0.25"/>

  <!-- BODY -->
  <rect x="102" y="168" width="66" height="76" rx="16" fill="url(#bodyGrad)"/>
  <!-- pocket -->
  <rect x="114" y="196" width="42" height="26" rx="8" fill="#5B21B6" opacity="0.75"/>
  <!-- drawstrings -->
  <line x1="128" y1="177" x2="123" y2="196" stroke="#C4B5FD" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="142" y1="177" x2="147" y2="196" stroke="#C4B5FD" stroke-width="1.5" stroke-linecap="round"/>

  <!-- LEGS -->
  <rect x="107" y="237" width="23" height="30" rx="10" fill="#1E1B4B"/>
  <rect x="140" y="237" width="23" height="30" rx="10" fill="#1E1B4B"/>
  <!-- shoes -->
  <ellipse cx="119" cy="270" rx="17" ry="7" fill="#00FFFF"/>
  <ellipse cx="152" cy="270" rx="17" ry="7" fill="#00FFFF"/>
  <ellipse cx="114" cy="267" rx="6"  ry="3"  fill="#ffffff" opacity="0.2"/>
  <ellipse cx="147" cy="267" rx="6"  ry="3"  fill="#ffffff" opacity="0.2"/>

  <!-- LEFT ARM + LAPTOP -->
  <rect x="80"  y="172" width="20" height="46" rx="10" fill="url(#bodyGrad)"/>
  <circle cx="90" cy="220" r="11" fill="#FCD34D"/>
  <!-- laptop -->
  <rect x="50" y="202" width="42" height="28" rx="4" fill="#1E1B4B" stroke="#00FFFF" stroke-width="1.3"/>
  <rect x="52" y="204" width="38" height="22" rx="3" fill="#0D0221"/>
  <line x1="55" y1="208" x2="68" y2="208" stroke="#00FFFF" stroke-width="1.1" opacity="0.9"/>
  <line x1="55" y1="212" x2="80" y2="212" stroke="#A78BFA" stroke-width="1.1" opacity="0.8"/>
  <line x1="55" y1="216" x2="72" y2="216" stroke="#00FFFF" stroke-width="1.1" opacity="0.7"/>
  <line x1="55" y1="220" x2="76" y2="220" stroke="#FF6B6B" stroke-width="1.1" opacity="0.6"/>
  <rect x="52" y="228" width="38" height="3" rx="1.5" fill="#2D2B55"/>

  <!-- RIGHT ARM WAVING -->
  <g class="arm-wave">
    <rect x="169" y="168" width="20" height="46" rx="10" fill="url(#bodyGrad)"/>
    <circle cx="179" cy="216" r="11" fill="#FCD34D"/>
    <line x1="171" y1="210" x2="165" y2="201" stroke="#FCD34D" stroke-width="4" stroke-linecap="round"/>
    <line x1="179" y1="207" x2="177" y2="197" stroke="#FCD34D" stroke-width="4" stroke-linecap="round"/>
    <line x1="187" y1="210" x2="189" y2="200" stroke="#FCD34D" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- NECK -->
  <rect x="126" y="153" width="18" height="18" rx="6" fill="#FCD34D"/>

  <!-- HEAD -->
  <circle cx="135" cy="126" r="40" fill="#FCD34D"/>
  <ellipse cx="118" cy="106" rx="11" ry="7" fill="#fff" opacity="0.1" transform="rotate(-25,118,106)"/>

  <!-- HAIR -->
  <ellipse cx="135" cy="92"  rx="40" ry="16" fill="#1a0a2e"/>
  <rect x="95"  y="92"  width="80" height="20" rx="5" fill="#1a0a2e"/>
  <polygon points="104,92 96,70 112,86"  fill="#1a0a2e"/>
  <polygon points="120,88 116,65 127,83" fill="#1a0a2e"/>
  <polygon points="135,87 131,63 142,81" fill="#1a0a2e"/>
  <polygon points="150,88 147,65 157,83" fill="#1a0a2e"/>
  <polygon points="165,92 160,70 173,87" fill="#1a0a2e"/>

  <!-- LEFT EYE -->
  <g class="eye-l">
    <circle cx="120" cy="130" r="10"  fill="white"/>
    <circle cx="122" cy="130" r="6.5" fill="#1a0a2e"/>
    <circle cx="124" cy="127" r="2.2" fill="white"/>
  </g>
  <!-- RIGHT EYE -->
  <g class="eye-r">
    <circle cx="150" cy="130" r="10"  fill="white"/>
    <circle cx="152" cy="130" r="6.5" fill="#1a0a2e"/>
    <circle cx="154" cy="127" r="2.2" fill="white"/>
  </g>

  <!-- SMILE -->
  <path d="M 117 146 Q 135 164 153 146" stroke="#1a0a2e" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- GLASSES -->
  <rect x="107" y="120" width="22" height="18" rx="7" fill="none" stroke="#00FFFF" stroke-width="2.5"/>
  <rect x="141" y="120" width="22" height="18" rx="7" fill="none" stroke="#00FFFF" stroke-width="2.5"/>
  <line x1="129" y1="129" x2="141" y2="129" stroke="#00FFFF" stroke-width="2.2"/>
  <line x1="107" y1="129" x2="100" y2="126" stroke="#00FFFF" stroke-width="2"/>
  <line x1="163" y1="129" x2="170" y2="126" stroke="#00FFFF" stroke-width="2"/>
  <rect x="108" y="121" width="20" height="16" rx="6" fill="#00FFFF" opacity="0.07"/>
  <rect x="142" y="121" width="20" height="16" rx="6" fill="#00FFFF" opacity="0.07"/>

  <!-- BLUSH -->
  <ellipse cx="106" cy="144" rx="10" ry="6" fill="#FF6B6B" opacity="0.18"/>
  <ellipse cx="164" cy="144" rx="10" ry="6" fill="#FF6B6B" opacity="0.18"/>

</g><!-- /char -->


<!-- ══════════════════════════ -->
<!--  SPEECH BUBBLE            -->
<!-- ══════════════════════════ -->
<g class="bubble">
  <!-- drop shadow -->
  <rect x="205" y="24" width="228" height="88" rx="20" fill="#000" opacity="0.28"/>
  <!-- body -->
  <rect x="202" y="20" width="228" height="88" rx="20" fill="#0D0221" stroke="#00FFFF" stroke-width="2.2"/>
  <!-- inner highlight -->
  <rect x="205" y="23" width="222" height="82" rx="18" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.08"/>
  <!-- tail -->
  <polygon points="224,108 200,134 246,115" fill="#0D0221"/>
  <line x1="222" y1="107" x2="201" y2="133" stroke="#00FFFF" stroke-width="2.2"/>
  <line x1="246" y1="114" x2="224" y2="107" stroke="#0D0221" stroke-width="5"/>
  <!-- Hi text -->
  <text x="316" y="68" text-anchor="middle" font-family="'Courier New',monospace" font-size="24" font-weight="bold" fill="#00FFFF" filter="url(#glow)">👋  Hi There!</text>
  <!-- sub text -->
  <text x="316" y="96" text-anchor="middle" font-family="'Courier New',monospace" font-size="14" fill="#C4B5FD">Welcome to my profile ✨</text>
</g>


<!-- ══════════════════════════ -->
<!--  NAME + ROLE  right side  -->
<!-- ══════════════════════════ -->

<!-- vertical divider -->
<line x1="450" y1="30" x2="450" y2="268" stroke="#7C3AED" stroke-width="0.7" opacity="0.2"/>

<!-- glitch ghost layers -->
<text class="g1" x="620" y="162" text-anchor="middle" font-family="'Courier New',monospace" font-size="27" font-weight="900" fill="#FF6B6B">Deepamjyoti Mohanty</text>
<text class="g2" x="620" y="162" text-anchor="middle" font-family="'Courier New',monospace" font-size="27" font-weight="900" fill="#00FFFF">Deepamjyoti Mohanty</text>
<!-- main name -->
<text x="620" y="162" text-anchor="middle" font-family="'Courier New',monospace" font-size="27" font-weight="900" fill="#FFFFFF" filter="url(#softglow)">Deepamjyoti Mohanty</text>

<!-- animated underline -->
<line class="ul" x1="460" y1="172" x2="780" y2="172" stroke="url(#ul)" stroke-width="3" stroke-linecap="round"/>

