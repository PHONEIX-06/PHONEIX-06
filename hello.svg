<rect x="514" y="252" width="36" height="18" rx="5" fill="#160429" stroke="#00FFFF" stroke-width="1.1"/>
<text x="532" y="265" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#00FFFF">Java</text>

<rect x="556" y="252" width="40" height="18" rx="5" fill="#160429" stroke="#FF6B6B" stroke-width="1.1"/>
<text x="576" y="265" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#FF6B6B">React</text>

<rect x="602" y="252" width="36" height="18" rx="5" fill="#160429" stroke="#00ff88" stroke-width="1.1"/>
