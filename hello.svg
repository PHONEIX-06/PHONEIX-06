<text class="r2" x="620" y="200" text-anchor="middle" font-family="'Courier New',monospace" font-size="12.5" fill="#00FFFF">🚀 React · Node.js · Python · XGBoost · Docker · AWS</text>
<text class="r3" x="620" y="200" text-anchor="middle" font-family="'Courier New',monospace" font-size="12.5" fill="#FF6B6B">🎓 B.Tech CSE 2026 · CGPA 8.03 · Open to Work</text>

<!-- thin rule -->
<line x1="462" y1="215" x2="778" y2="215" stroke="#7C3AED" stroke-width="0.8" opacity="0.4"/>

<!-- available pulse -->
<circle class="pring" cx="475" cy="235" fill="none" stroke="#00ff88" stroke-width="2"/>
<circle class="pdot"  cx="475" cy="235" r="5" fill="#00ff88"/>
<text x="490" y="240" font-family="'Courier New',monospace" font-size="12" fill="#00ff88">Available for opportunities</text>

