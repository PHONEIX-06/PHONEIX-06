<rect x="644" y="252" width="44" height="18" rx="5" fill="#160429" stroke="#FBBF24" stroke-width="1.1"/>
<text x="666" y="265" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#FBBF24">Docker</text>

<rect x="694" y="252" width="28" height="18" rx="5" fill="#160429" stroke="#A78BFA" stroke-width="1.1"/>
<text x="708" y="265" text-anchor="middle" font-family="monospace" font-size="9.5" fill="#A78BFA">ML</text>

<rect x="728" y="252" width="44" height="18" rx="5" fill="#160429" stroke="#00FFFF" stroke-width="1.1"/>
